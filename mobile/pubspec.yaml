name: fleet_mint_mobile
description: Fleet Mint Ecosystem — Mobile app for transport management in Zambia
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # HTTP client
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.3

  # Typography
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Shimmer loading
  shimmer: ^3.0.0

  # QR code display
  qr_flutter: ^4.1.0

  # Charts
  fl_chart: ^0.69.0

  # Date / number formatting
  intl: ^0.19.0

  # Phone / URL launcher
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
